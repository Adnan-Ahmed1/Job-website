<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Job Portal</title>
    
    <!-- Google Fonts: Inter & Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-navy: #0B1C3F; /* Deeper navy matching reference */
            --primary-green: #15803D; /* Forest green matching reference */
            --accent-purple: #6366F1;
            --text-muted: #64748B;
            --bg-light: #FAFAFC;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
            --card-border: 1px solid #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--primary-navy);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Heading Section */
        .we-are {
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-purple);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 8px;
        }

        .main-title {
            font-size: 46px;
            font-weight: 800;
            color: var(--primary-navy);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .main-title span {
            color: var(--primary-green);
        }

        .subtitle {
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-muted);
            max-width: 520px;
            margin: 0 auto 20px auto;
            font-weight: 500;
        }

        /* Illustration Wrapper */
        .illustration-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .illustration-svg {
            width: 100%;
            height: auto;
            max-height: 340px;
        }

        /* Sub-text below illustration */
        .info-text {
            font-size: 14.5px;
            line-height: 1.5;
            color: var(--text-muted);
            margin: 20px 0 30px 0;
            font-weight: 500;
            max-width: 500px;
        }

        /* Countdown Grid */
        .countdown-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            max-width: 600px;
        }

        .countdown-card {
            background: #FFFFFF;
            border: var(--card-border);
            box-shadow: var(--card-shadow);
            border-radius: 16px;
            width: 110px;
            height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .countdown-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.05), 0 10px 15px -6px rgba(0, 0, 0, 0.05);
        }

        .countdown-value {
            font-size: 38px;
            font-weight: 800;
            color: var(--primary-green);
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .countdown-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-navy);
            letter-spacing: 0.02em;
        }

        .countdown-colon {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-navy);
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 110px;
            padding-bottom: 8px; /* Visual center adjustment */
        }

        /* Height-based responsive styles to fit on single screens */
        @media (max-height: 780px) {
            body {
                padding: 10px;
            }
            .we-are {
                font-size: 12px;
                margin-bottom: 4px;
            }
            .main-title {
                font-size: 38px;
                margin-bottom: 8px;
            }
            .subtitle {
                font-size: 13.5px;
                margin-bottom: 12px;
            }
            .illustration-container {
                max-width: 580px;
            }
            .illustration-svg {
                max-height: 270px;
            }
            .info-text {
                font-size: 13.5px;
                margin: 12px 0 20px 0;
            }
            .countdown-card {
                width: 95px;
                height: 95px;
                border-radius: 12px;
            }
            .countdown-value {
                font-size: 30px;
                margin-bottom: 4px;
            }
            .countdown-label {
                font-size: 11px;
            }
            .countdown-colon {
                font-size: 22px;
                height: 95px;
                padding-bottom: 6px;
            }
        }

        /* Mobile Responsive adjustments */
        @media (max-width: 640px) {
            body {
                padding: 15px 10px;
            }

            .main-title {
                font-size: 32px;
            }

            .subtitle {
                font-size: 13px;
                padding: 0 5px;
            }

            .countdown-container {
                gap: 8px;
            }

            .countdown-card {
                width: 72px;
                height: 80px;
                border-radius: 12px;
            }

            .countdown-value {
                font-size: 24px;
            }

            .countdown-label {
                font-size: 10px;
            }

            .countdown-colon {
                font-size: 18px;
                height: 80px;
                padding-bottom: 4px;
            }

            .info-text {
                font-size: 13px;
                margin: 15px 0 25px 0;
            }
        }

        /* Subtle Animations */
        @keyframes hoverAirplaneLeft {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-6px, -8px) rotate(-2deg); }
        }

        @keyframes hoverAirplaneRight {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(6px, 8px) rotate(2deg); }
        }

        @keyframes rotateGear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes swayPlant {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(2deg); }
        }

        .animated-airplane-left {
            animation: hoverAirplaneLeft 5s ease-in-out infinite;
        }

        .animated-airplane-right {
            animation: hoverAirplaneRight 5.5s ease-in-out infinite;
        }

        .animated-gear-left {
            transform-origin: 215px 150px;
            animation: rotateGear 16s linear infinite;
        }

        .animated-gear-right {
            transform-origin: 585px 165px;
            animation: rotateGear 20s linear infinite reverse;
        }

        .animated-plant {
            transform-origin: 185px 320px;
            animation: swayPlant 6s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Top Title and Description -->
        <div class="we-are">We Are</div>
        <h1 class="main-title">Coming <span>Soon!</span></h1>
        <p class="subtitle">We are working hard to build something amazing for all government job aspirants. Stay tuned!</p>

        <!-- Central Illustration -->
        <div class="illustration-container">
            <svg class="illustration-svg" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Definitions for gradients and patterns -->
                <defs>
                    <!-- Soft Background Gradients -->
                    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                        <stop offset="0%" stop-color="#EEF2F6" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="#FAFAFC" stop-opacity="0"/>
                    </radialGradient>
                    
                    <!-- Metal Gradients -->
                    <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#94A3B8"/>
                        <stop offset="50%" stop-color="#CBD5E1"/>
                        <stop offset="100%" stop-color="#64748B"/>
                    </linearGradient>

                    <!-- Laptop Base Gradient -->
                    <linearGradient id="laptop-base-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#334155"/>
                        <stop offset="100%" stop-color="#0F172A"/>
                    </linearGradient>

                    <!-- Barrier Stripes Pattern - Thinner, matching reference scale -->
                    <pattern id="barrier-stripes" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                        <rect width="10" height="20" fill="#FBBF24" />
                        <rect x="10" width="10" height="20" fill="#1E293B" />
                    </pattern>

                    <!-- Board Clip Path to enforce rounded corners on borders -->
                    <clipPath id="board-clip">
                        <rect x="286" y="172" width="228" height="50" rx="4" />
                    </clipPath>
                </defs>

                <!-- Soft Background Glow -->
                <ellipse cx="400" cy="230" rx="300" ry="130" fill="url(#bg-glow)" />

                <!-- Soft Background Blobs / Clouds -->

                <!-- Floating Gears (Light Lavender) -->
                <!-- Gear Left -->
                <g class="animated-gear-left" opacity="0.25">
                    <circle cx="215" cy="150" r="16" stroke="#C7D2FE" stroke-width="5" stroke-dasharray="6,4" fill="none" />
                    <circle cx="215" cy="150" r="7" fill="#C7D2FE" />
                </g>
                <!-- Gear Right -->
                <g class="animated-gear-right" opacity="0.25">
                    <circle cx="585" cy="165" r="20" stroke="#C7D2FE" stroke-width="6" stroke-dasharray="8,5" fill="none" />
                    <circle cx="585" cy="165" r="9" fill="#C7D2FE" />
                </g>

                <!-- Dotted Paths for Paper Airplanes -->

                <!-- Right path curving down-right -->

                <!-- Paper Airplane Left (flying up-left) -->
                <g class="animated-airplane-left" transform="translate(195, 145) rotate(-45)">
                    <path d="M0,15 L22,0 L12,22 L10,14 Z" fill="#818CF8" />
                    <path d="M10,14 L0,15 L12,22 Z" fill="#6366F1" opacity="0.85" />
                </g>

                <!-- Paper Airplane Right (flying down-right) -->
                <g class="animated-airplane-right" transform="translate(665, 195) rotate(45)">
                    <path d="M0,15 L22,0 L12,22 L10,14 Z" fill="#818CF8" />
                    <path d="M10,14 L0,15 L12,22 Z" fill="#6366F1" opacity="0.85" />
                </g>

                <!-- LAPTOP ILLUSTRATION -->
                <!-- Screen Back Bezel Shadow -->
                <rect x="247" y="117" width="306" height="196" rx="14" fill="#0F172A" opacity="0.08" />
                
                <!-- Main Screen Bezel -->
                <rect x="250" y="115" width="300" height="195" rx="12" fill="#1E293B" stroke="#0F172A" stroke-width="2" />
                
                <!-- Webcam Dot -->
                <circle cx="400" cy="122" r="2.5" fill="#475569" />
                <circle cx="400" cy="122" r="1" fill="#0F172A" />

                <!-- Screen Inner Content Panel -->
                <rect x="260" y="130" width="280" height="168" fill="#EEF2F6" />
                
                <!-- Web Browser Mock Window inside Screen -->
                <rect x="266" y="136" width="268" height="156" rx="4" fill="#FFFFFF" />
                
                <!-- Browser Header Bar -->
                <rect x="266" y="136" width="268" height="18" rx="4" fill="#EEF2F6" />
                <!-- Cover bottom rounded corners of header -->
                <rect x="266" y="146" width="268" height="8" fill="#EEF2F6" />
                
                <!-- Browser Window Action Dots (Light Lavender) -->
                <circle cx="276" cy="145" r="2.5" fill="#C7D2FE" />
                <circle cx="284" cy="145" r="2.5" fill="#C7D2FE" />
                <circle cx="292" cy="145" r="2.5" fill="#C7D2FE" />

                <!-- BARRIER / UNDER CONSTRUCTION INSIDE LAPTOP -->
                <!-- Barrier Steel Stands (wider, metallic) -->
                <rect x="322" y="210" width="14" height="88" fill="url(#metal-grad)" stroke="#1E293B" stroke-width="1.5" />
                <rect x="464" y="210" width="14" height="88" fill="url(#metal-grad)" stroke="#1E293B" stroke-width="1.5" />

                <!-- Barrier Main Board with Clip Path -->
                <g clip-path="url(#board-clip)">
                    <!-- Solid Yellow Base -->
                    <rect x="286" y="172" width="228" height="50" fill="#FBBF24" />
                    
                    <!-- Top Striped Band -->
                    <rect x="286" y="172" width="228" height="8" fill="url(#barrier-stripes)" />
                    <line x1="286" y1="180" x2="514" y2="180" stroke="#1E293B" stroke-width="1.5" />
                    
                    <!-- Bottom Striped Band -->
                    <rect x="286" y="214" width="228" height="8" fill="url(#barrier-stripes)" />
                    <line x1="286" y1="214" x2="514" y2="214" stroke="#1E293B" stroke-width="1.5" />
                    
                    <!-- Centered Bold Text -->
                    <text x="400" y="196" font-family="'Inter', sans-serif" font-size="10.5" font-weight="900" fill="#0F172A" text-anchor="middle" letter-spacing="0.06em">UNDER</text>
                    <text x="400" y="208" font-family="'Inter', sans-serif" font-size="9" font-weight="900" fill="#0F172A" text-anchor="middle" letter-spacing="0.06em">CONSTRUCTION</text>
                </g>
                <!-- Outside Border of Barrier Board -->
                <rect x="286" y="172" width="228" height="50" rx="4" fill="none" stroke="#1E293B" stroke-width="2" />

                <!-- Laptop Base / Keyboard -->
                <!-- Laptop Base Plate shadow -->
                <path d="M 215 320 L 585 320 L 595 328 L 205 328 Z" fill="#0F172A" opacity="0.2" />
                <!-- Laptop Base Plate -->
                <path d="M 220 310 L 580 310 L 590 322 C 590 325, 585 328, 575 328 L 225 328 C 215 328, 210 325, 210 322 Z" fill="url(#laptop-base-grad)" />
                <!-- Laptop Base Notch / Trackpad reflection -->
                <path d="M 375 311 L 425 311 L 428 314 L 372 314 Z" fill="#475569" opacity="0.6" />

                <!-- SURROUNDING PROPS -->

                <!-- Plant (Left of Laptop) -->
                <g class="animated-plant">
                    <!-- Plant Leaves (5 organic leaves split for shading) -->
                    <!-- Leaf 1: Center (pointing up) -->
                    <path d="M 185 285 Q 178 235 185 200 Q 185 235 185 285" fill="#047857" />
                    <path d="M 185 285 Q 185 235 185 200 Q 192 235 185 285" fill="#10B981" />
                    
                    <!-- Leaf 2: Left-Upper -->
                    <path d="M 183 285 Q 155 260 162 225 Q 173 250 183 285" fill="#065F46" />
                    <path d="M 183 285 Q 173 250 162 225 Q 173 240 183 285" fill="#059669" />

                    <!-- Leaf 3: Right-Upper -->
                    <path d="M 187 285 Q 197 250 208 225 Q 197 250 187 285" fill="#059669" />
                    <path d="M 187 285 Q 197 250 208 225 Q 215 260 187 285" fill="#10B981" />

                    <!-- Leaf 4: Left-Horizontal -->
                    <path d="M 180 285 Q 148 280 152 258 Q 167 270 180 285" fill="#065F46" />
                    <path d="M 180 285 Q 167 270 152 258 Q 163 265 180 285" fill="#059669" />

                    <!-- Leaf 5: Right-Horizontal -->
                    <path d="M 190 285 Q 203 270 218 258 Q 203 270 190 285" fill="#059669" />
                    <path d="M 190 285 Q 203 270 218 258 Q 222 280 190 285" fill="#10B981" />

                    <!-- Plant Pot -->
                    <path d="M 172 285 L 198 285 L 194 315 L 176 315 Z" fill="#1E293B" />
                    <!-- Pot rim -->
                    <rect x="170" y="282" width="30" height="4" rx="1.5" fill="#334155" />
                    <!-- Pot shadow -->
                    <ellipse cx="185" cy="315" rx="9" ry="2.5" fill="#0F172A" opacity="0.3" />
                </g>

                <!-- Traffic Cone (In front of Plant / overlapping base) -->
                <g>
                    <!-- Cone shadow -->
                    <ellipse cx="235" cy="326" rx="18" ry="4.5" fill="#0F172A" opacity="0.2" />
                    
                    <!-- Cone Base -->
                    <path d="M 215 321 L 255 321 L 257 326 L 213 326 Z" fill="#EA580C" />
                    <path d="M 216 322 L 254 322 L 255 324 L 215 324 Z" fill="#F97316" />
                    
                    <!-- Cone Body -->
                    <path d="M 231 285 L 239 285 L 249 321 L 221 321 Z" fill="#EA580C" />
                    
                    <!-- Cone White Stripes -->
                    <!-- Top White Stripe -->
                    <path d="M 232.5 292 L 237.5 292 L 239.5 300 L 230.5 300 Z" fill="#FFFFFF" />
                    <!-- Bottom White Stripe -->
                    <path d="M 226 307 L 244 307 L 246.5 315 L 223.5 315 Z" fill="#FFFFFF" />
                    
                    <!-- Orange Highlights -->
                    <path d="M 231 285 L 235 285 L 241 321 L 221 321 Z" fill="#F97316" opacity="0.8" />
                    <!-- Tip cap -->
                    <path d="M 232.5 282 L 237.5 282 L 239 285 L 231 285 Z" fill="#EA580C" />
                </g>

                <!-- Construction Hard Hat (Right of Laptop) -->
                <g>
                    <!-- Hat Shadow -->
                    <ellipse cx="615" cy="323" rx="32" ry="5" fill="#0F172A" opacity="0.2" />

                    <!-- Hat Dome -->
                    <path d="M 588 312 C 588 280, 642 280, 642 312 Z" fill="#D97706" />
                    <!-- Hat Highlight Inner Dome -->
                    <path d="M 591 310 C 591 283, 639 283, 639 310 Z" fill="#F59E0B" />
                    <!-- Hat Ridge (Center line of helmet) -->
                    <path d="M 613 281 C 615 281, 618 290, 618 312 L 612 312 C 612 290, 611 281, 613 281 Z" fill="#FABF24" />

                    <!-- Hat Brim -->
                    <path d="M 578 312 C 578 312, 615 307, 652 312 C 657 313, 657 317, 647 317 C 615 318, 588 318, 578 317 C 578 315, 576 312, 578 312 Z" fill="#D97706" />
                    <path d="M 580 313 C 580 313, 615 309, 650 313 C 652 314, 650 316, 645 316 C 615 316, 590 316, 581 315 C 581 314, 580 313, 580 313 Z" fill="#FABF24" />
                </g>
            </svg>
        </div>

        <!-- Info Text below illustration -->
        <p class="info-text">Our website is under construction and will be live very soon.<br>Thank you for your patience and support.</p>

        <!-- Countdown Timer -->
        <div class="countdown-container">
            <!-- Days -->
            <div class="countdown-card">
                <div class="countdown-value" id="days">14</div>
                <div class="countdown-label">Days</div>
            </div>
            
            <div class="countdown-colon">:</div>

            <!-- Hours -->
            <div class="countdown-card">
                <div class="countdown-value" id="hours">08</div>
                <div class="countdown-label">Hours</div>
            </div>

            <div class="countdown-colon">:</div>

            <!-- Minutes -->
            <div class="countdown-card">
                <div class="countdown-value" id="minutes">36</div>
                <div class="countdown-label">Minutes</div>
            </div>

            <div class="countdown-colon">:</div>

            <!-- Seconds -->
            <div class="countdown-card">
                <div class="countdown-value" id="seconds">42</div>
                <div class="countdown-label">Seconds</div>
            </div>
        </div>
    </div>

    <script>
        // Countdown timer functionality
        // Set target date dynamically to 14 days, 8 hours, 36 minutes, and 42 seconds from now,
        // and store it in localStorage so the countdown remains continuous and consistent.
        let targetTime = localStorage.getItem('coming_soon_target_time');

        if (!targetTime) {
            // 14 days + 8 hours + 36 mins + 42 secs
            const offset = (10 * 24 * 60 * 60 * 1000) + (8 * 60 * 60 * 1000) + (36 * 60 * 1000) + (42 * 1000);
            targetTime = Date.now() + offset;
            localStorage.setItem('coming_soon_target_time', targetTime);
        } else {
            targetTime = parseInt(targetTime, 10);
            
            // If the saved target time has already passed, reset it to the offset to make the page always look active
            if (targetTime < Date.now()) {
                const offset = (10 * 24 * 60 * 60 * 1000) + (8 * 60 * 60 * 1000) + (36 * 60 * 1000) + (42 * 1000);
                targetTime = Date.now() + offset;
                localStorage.setItem('coming_soon_target_time', targetTime);
            }
        }

        function updateCountdown() {
            const now = Date.now();
            const difference = targetTime - now;

            if (difference <= 0) {
                document.getElementById('days').innerText = '00';
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Format numbers to 2 digits
            document.getElementById('days').innerText = String(days).padStart(2, '0');
            document.getElementById('hours').innerText = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
        }

        // Run immediately on page load
        updateCountdown();
        // Update every second
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
